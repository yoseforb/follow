follow_users:
  query: |
    SELECT user_type, count(*) AS count
    FROM "user".users
    GROUP BY user_type
  metrics:
    - user_type:
        usage: "LABEL"
        description: "User lifecycle type"
    - count:
        usage: "GAUGE"
        description: "Number of users by type"

follow_routes:
  query: |
    SELECT status, count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL
    GROUP BY status
  metrics:
    - status:
        usage: "LABEL"
        description: "Route lifecycle status"
    - count:
        usage: "GAUGE"
        description: "Number of routes by status"

follow_routes_by_owner:
  query: |
    SELECT owner_type, count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL
    GROUP BY owner_type
  metrics:
    - owner_type:
        usage: "LABEL"
        description: "Route owner type"
    - count:
        usage: "GAUGE"
        description: "Number of routes by owner type"

follow_images:
  query: |
    SELECT upload_status, count(*) AS count
    FROM images.images
    GROUP BY upload_status
  metrics:
    - upload_status:
        usage: "LABEL"
        description: "Image upload status"
    - count:
        usage: "GAUGE"
        description: "Number of images by upload status"

follow_user_auth_methods:
  query: |
    SELECT provider, count(*) AS count
    FROM "user".auth_methods
    GROUP BY provider
  metrics:
    - provider:
        usage: "LABEL"
        description: "Authentication provider"
    - count:
        usage: "GAUGE"
        description: "Number of users by auth provider"

follow_user_registration_stats:
  query: |
    SELECT
      COALESCE(EXTRACT(EPOCH FROM avg(registered_at - created_at))
        FILTER (WHERE user_type = 'registered' AND registered_at IS NOT NULL), 0)::float
        AS avg_registration_seconds,
      COALESCE(count(*) FILTER (WHERE user_type = 'registered'), 0) AS registered_count,
      count(*) AS total_count
    FROM "user".users
  metrics:
    - avg_registration_seconds:
        usage: "GAUGE"
        description: "Average seconds from creation to registration"
    - registered_count:
        usage: "GAUGE"
        description: "Total registered users"
    - total_count:
        usage: "GAUGE"
        description: "Total users"

follow_user_multi_auth:
  query: |
    SELECT COALESCE(count(*), 0) AS count
    FROM (
      SELECT user_id
      FROM "user".auth_methods
      GROUP BY user_id
      HAVING count(*) > 1
    ) multi
  metrics:
    - count:
        usage: "GAUGE"
        description: "Users with multiple auth methods"

follow_user_blacklisted:
  query: |
    SELECT count(*) AS count
    FROM "user".blacklisted_users
    WHERE expires_at > now()
  metrics:
    - count:
        usage: "GAUGE"
        description: "Currently blacklisted users"

follow_route_waypoint_stats:
  query: |
    SELECT
      COALESCE(avg(total_waypoints), 0)::float AS avg_waypoints,
      COALESCE(min(total_waypoints), 0) AS min_waypoints,
      COALESCE(max(total_waypoints), 0) AS max_waypoints
    FROM route.routes
    WHERE deleted_at IS NULL AND total_waypoints > 0
  metrics:
    - avg_waypoints:
        usage: "GAUGE"
        description: "Average waypoints per route"
    - min_waypoints:
        usage: "GAUGE"
        description: "Minimum waypoints in a route"
    - max_waypoints:
        usage: "GAUGE"
        description: "Maximum waypoints in a route"

follow_route_waypoint_distribution:
  query: |
    SELECT
      CASE
        WHEN total_waypoints BETWEEN 1 AND 3 THEN '1-3'
        WHEN total_waypoints BETWEEN 4 AND 7 THEN '4-7'
        WHEN total_waypoints BETWEEN 8 AND 15 THEN '8-15'
        WHEN total_waypoints >= 16 THEN '16+'
      END AS bucket,
      count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL AND total_waypoints > 0
    GROUP BY 1
  metrics:
    - bucket:
        usage: "LABEL"
        description: "Waypoint count bucket"
    - count:
        usage: "GAUGE"
        description: "Routes in this bucket"

follow_route_content:
  query: |
    SELECT
      count(*) AS total_routes,
      COALESCE(count(*) FILTER (WHERE description IS NOT NULL AND description != ''), 0)
        AS with_description,
      COALESCE(count(*) FILTER (WHERE address != ''), 0) AS with_address,
      COALESCE(count(*) FILTER (WHERE start_point != ''), 0) AS with_start_point,
      COALESCE(count(*) FILTER (WHERE end_point != ''), 0) AS with_end_point,
      COALESCE(count(*) FILTER (WHERE location_name IS NOT NULL AND location_name != ''), 0)
        AS with_location_name
    FROM route.routes
    WHERE deleted_at IS NULL
  metrics:
    - total_routes:
        usage: "GAUGE"
        description: "Total active routes"
    - with_description:
        usage: "GAUGE"
        description: "Routes with description"
    - with_address:
        usage: "GAUGE"
        description: "Routes with address"
    - with_start_point:
        usage: "GAUGE"
        description: "Routes with start point"
    - with_end_point:
        usage: "GAUGE"
        description: "Routes with end point"
    - with_location_name:
        usage: "GAUGE"
        description: "Routes with location name"

follow_route_visibility:
  query: |
    SELECT visibility, count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL
    GROUP BY visibility
  metrics:
    - visibility:
        usage: "LABEL"
        description: "Route visibility"
    - count:
        usage: "GAUGE"
        description: "Routes by visibility"

follow_route_access:
  query: |
    SELECT access_method, count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL
    GROUP BY access_method
  metrics:
    - access_method:
        usage: "LABEL"
        description: "Route access method"
    - count:
        usage: "GAUGE"
        description: "Routes by access method"

follow_route_lifecycle:
  query: |
    SELECT lifecycle_type, count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL
    GROUP BY lifecycle_type
  metrics:
    - lifecycle_type:
        usage: "LABEL"
        description: "Route lifecycle type"
    - count:
        usage: "GAUGE"
        description: "Routes by lifecycle type"

follow_route_publish_stats:
  query: |
    SELECT
      COALESCE(EXTRACT(EPOCH FROM avg(updated_at - created_at))
        FILTER (WHERE status = 'published'), 0)::float AS avg_publish_seconds,
      COALESCE(count(*) FILTER (WHERE status IN ('preparing', 'pending')
        AND created_at < now() - interval '24 hours'), 0) AS stuck_routes
    FROM route.routes
    WHERE deleted_at IS NULL
  metrics:
    - avg_publish_seconds:
        usage: "GAUGE"
        description: "Average seconds from creation to publish"
    - stuck_routes:
        usage: "GAUGE"
        description: "Routes stuck in preparing/pending over 24h"

follow_route_revisions:
  query: |
    SELECT count(*) AS count
    FROM route.routes
    WHERE deleted_at IS NULL AND parent_route_id IS NOT NULL
  metrics:
    - count:
        usage: "GAUGE"
        description: "Route revisions"

follow_user_growth:
  query: |
    SELECT
      COALESCE(count(*) FILTER (WHERE created_at >= now() - interval '24 hours'), 0) AS new_24h,
      COALESCE(count(*) FILTER (WHERE created_at >= now() - interval '7 days'), 0) AS new_7d,
      COALESCE(count(*) FILTER (WHERE created_at >= now() - interval '30 days'), 0) AS new_30d
    FROM "user".users
  metrics:
    - new_24h:
        usage: "GAUGE"
        description: "New users in last 24 hours"
    - new_7d:
        usage: "GAUGE"
        description: "New users in last 7 days"
    - new_30d:
        usage: "GAUGE"
        description: "New users in last 30 days"

follow_registration_growth:
  query: |
    SELECT
      COALESCE(count(*) FILTER (WHERE registered_at >= now() - interval '24 hours'), 0) AS new_24h,
      COALESCE(count(*) FILTER (WHERE registered_at >= now() - interval '7 days'), 0) AS new_7d,
      COALESCE(count(*) FILTER (WHERE registered_at >= now() - interval '30 days'), 0) AS new_30d
    FROM "user".users
    WHERE user_type = 'registered'
  metrics:
    - new_24h:
        usage: "GAUGE"
        description: "New registrations in last 24 hours"
    - new_7d:
        usage: "GAUGE"
        description: "New registrations in last 7 days"
    - new_30d:
        usage: "GAUGE"
        description: "New registrations in last 30 days"

follow_route_growth:
