follow_bookmark_growth:
  query: |
    SELECT
      COALESCE(count(*) FILTER (WHERE saved_at >= now() - interval '24 hours'), 0) AS new_24h,
      COALESCE(count(*) FILTER (WHERE saved_at >= now() - interval '7 days'), 0) AS new_7d,
      COALESCE(count(*) FILTER (WHERE saved_at >= now() - interval '30 days'), 0) AS new_30d
    FROM route.saved_routes
  metrics:
    - new_24h:
        usage: "GAUGE"
        description: "New bookmarks in last 24 hours"
    - new_7d:
        usage: "GAUGE"
        description: "New bookmarks in last 7 days"
    - new_30d:
        usage: "GAUGE"
        description: "New bookmarks in last 30 days"

follow_engagement_bookmarks:
  query: |
    SELECT
      count(*) AS total_bookmarks,
      count(DISTINCT route_id) AS bookmarked_routes,
      count(DISTINCT user_id) AS users_with_bookmarks
    FROM route.saved_routes
  metrics:
    - total_bookmarks:
        usage: "GAUGE"
        description: "Total bookmark count"
    - bookmarked_routes:
        usage: "GAUGE"
        description: "Routes with at least one bookmark"
    - users_with_bookmarks:
        usage: "GAUGE"
        description: "Users who have bookmarked routes"

follow_engagement_routes_per_user:
  query: |
    SELECT
      COALESCE(avg(route_count), 0)::float AS avg_routes_per_user,
      COALESCE(max(route_count), 0) AS max_routes_per_user
    FROM (
      SELECT owner_id, count(*) AS route_count
      FROM route.routes
      WHERE deleted_at IS NULL
      GROUP BY owner_id
    ) per_user
  metrics:
    - avg_routes_per_user:
        usage: "GAUGE"
        description: "Average routes per user"
    - max_routes_per_user:
        usage: "GAUGE"
        description: "Maximum routes by single user"

follow_engagement_sessions:
  query: |
    SELECT
      count(*) AS total_sessions,
      count(DISTINCT user_id) AS users_with_sessions
    FROM "user".user_sessions
    WHERE expires_at > now()
  metrics:
    - total_sessions:
        usage: "GAUGE"
        description: "Active sessions"
    - users_with_sessions:
        usage: "GAUGE"
        description: "Users with active sessions"

follow_b2b_metrics:
  query: |
    SELECT
      COALESCE(count(*) FILTER (WHERE visibility = 'public' AND status = 'published'), 0)
        AS public_published_routes,
      COALESCE(count(*) FILTER (WHERE owner_type = 'group'), 0) AS group_owned_routes
    FROM route.routes
    WHERE deleted_at IS NULL
  metrics:
    - public_published_routes:
        usage: "GAUGE"
        description: "Publicly published routes"
    - group_owned_routes:
        usage: "GAUGE"
        description: "Group-owned routes"
