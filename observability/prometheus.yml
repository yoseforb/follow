global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: follow-api
    static_configs:
      - targets: ["follow-api:8080"]
    metrics_path: /metrics

  - job_name: follow-image-gateway
    static_configs:
      - targets: ["follow-image-gateway:8090"]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
