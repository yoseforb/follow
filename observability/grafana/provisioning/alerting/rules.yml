  # ── Log-Based Alerts (Loki) ─────────────────────────────────────
  - orgId: 1
    name: log-alerts
    folder: Application
    interval: 1m
    rules:
      - uid: log-panic-fatal
        title: Panic or fatal log detected
        noDataState: OK
        condition: C
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Panic or fatal log detected in {{ $labels.container }} — service may have crashed"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: sum by (container) (count_over_time({container=~"follow-api|follow-image-gateway"} | json | level=~"fatal|panic" [5m]))
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]

      - uid: log-error-rate-high
        title: Error log rate above 5/min
        noDataState: OK
        condition: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.container }} logging more than 5 errors per minute — investigate root cause"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: sum by (container) (count_over_time({container=~"follow-api|follow-image-gateway"} | json | level="error" [1m]))
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]

      - uid: log-error-rate-critical
        title: Error log rate above 30/min
        noDataState: OK
        condition: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.container }} logging more than 30 errors per minute — likely outage"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: sum by (container) (count_over_time({container=~"follow-api|follow-image-gateway"} | json | level="error" [1m]))
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]

  # ── Backup Alerts (Loki) ────────────────────────────────────────
  - orgId: 1
    name: backup-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: backup-not-completed
        title: Daily backup did not complete
        noDataState: OK
        condition: C
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in the last 25 hours — data protection at risk"
        data:
          - refId: A
            relativeTimeRange: { from: 90000, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: >-
                count_over_time({container="follow-backup-1"} |= "backup: complete" [25h])
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]

      - uid: backup-error
        title: Backup error detected
        noDataState: OK
        condition: C
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Backup process logged an error — backup may be incomplete"
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: >-
                count_over_time({container="follow-backup-1"} |~ "error|failed|fatal" [1h])
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
