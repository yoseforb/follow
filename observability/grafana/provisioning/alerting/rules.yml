        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: redis_memory_used_bytes{job="valkey-exporter"} / redis_memory_max_bytes{job="valkey-exporter"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
