# Master Docker Compose — Full-Stack Follow Platform
#
# Combines infrastructure from follow-api and follow-image-gateway into a
# unified development environment. Each sub-repo keeps its own compose file
# for isolated development; this file orchestrates the full stack.
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose up -d postgres     # Start just the database
#   docker compose logs -f follow-api # Tail API logs
#
# Per-repo isolated development (unchanged):
#   cd follow-api && docker compose up -d
#   cd follow-image-gateway && docker compose up -d
#
# Port override example (for integration tests):
#   POSTGRES_HOST_PORT=15432 VALKEY_HOST_PORT=16379 docker compose up -d

services:
  # ── Infrastructure ─────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-follow-postgres}
    restart: unless-stopped
    command:
        - postgres
        - -c
        - log_min_duration_statement=500
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./observability/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:8
    container_name: ${VALKEY_CONTAINER_NAME:-follow-valkey}
    restart: unless-stopped
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - valkey_data:/data
    ports:
      - "127.0.0.1:${VALKEY_HOST_PORT:-6379}:6379"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-follow-minio}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing myminio/$$MINIO_BUCKET_NAME;
      mc version enable myminio/$$MINIO_BUCKET_NAME;
      echo 'Bucket '$$MINIO_BUCKET_NAME' ready';
      "
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Application Services ───────────────────────────────────────────

  follow-api:
    image: follow-api:latest
    build:
      context: ./follow-api
      dockerfile: Dockerfile
      additional_contexts:
        follow-pkg: ./follow-pkg
    container_name: ${API_CONTAINER_NAME:-follow-api}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - LOGGING_FORMAT=${LOGGING_FORMAT:-json}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - POSTGRESQL_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE}
      - VALKEY_ADDRESS=valkey:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_EXTERNAL_USE_SSL=${MINIO_EXTERNAL_USE_SSL:-${MINIO_USE_SSL}}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - FOLLOW_API_ED25519_PRIVATE_KEY=${FOLLOW_API_ED25519_PRIVATE_KEY}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://${HOST_IP:-localhost}:${GATEWAY_HOST_PORT:-8090}}
      - SECURITY_IP_HASH_KEY=${SECURITY_IP_HASH_KEY}
      - SECURITY_PII_ENCRYPTION_KEY=${SECURITY_PII_ENCRYPTION_KEY}
      - SECURITY_PII_INDEX_KEY=${SECURITY_PII_INDEX_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.resend.com}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME:-resend}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8080}:8080"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "1.0"
    healthcheck:
      # Use GET (-O /dev/null), not --spider: --spider sends HEAD, which
      # Goa-generated routes reject with 405 since /health is GET-only.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  follow-image-gateway:
    image: follow-image-gateway:latest
    build:
      context: ./follow-image-gateway
      dockerfile: Dockerfile
      additional_contexts:
        follow-pkg: ./follow-pkg
    container_name: ${GATEWAY_CONTAINER_NAME:-follow-image-gateway}
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      - LOGGING_FORMAT=${LOGGING_FORMAT:-json}
      - GATEWAY_SERVER_HOST=0.0.0.0
      - GATEWAY_SERVER_PORT=8090
      - IMG_GW_VALKEY_ADDRESSES=valkey:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - FOLLOW_API_ED25519_PUBLIC_KEY=${FOLLOW_API_ED25519_PUBLIC_KEY}
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8090}:8090"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1792m
          cpus: "2.0"
    healthcheck:
      # Use GET (-O /dev/null), not --spider: --spider sends HEAD, which
      # Goa-generated routes reject with 405 since /health is GET-only.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backup (prod only) ──────────────────────────────────────────

  backup:
    build:
      context: .
      dockerfile: scripts/backup.Dockerfile
    profiles: [prod]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BACKUP_BUCKET=${R2_BACKUP_BUCKET}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - MINIO_ACCESS_KEY_ID=${MINIO_ACCESS_KEY_ID}
      - MINIO_SECRET_ACCESS_KEY=${MINIO_SECRET_ACCESS_KEY}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
      - AGE_KEY=${AGE_KEY}
    volumes:
      - ./.env:/backup-src/.env:ro
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [prod]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      - follow-api
      - follow-image-gateway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ── Observability (opt-in) ─────────────────────────────────────────

  loki:
    image: grafana/loki:3.7.0
    profiles: [observability]
    container_name: ${LOKI_CONTAINER_NAME:-follow-loki}
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_HOST_PORT:-3100}:3100"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  alloy:
    image: grafana/alloy:v1.16.1
    profiles: [observability]
    container_name: ${ALLOY_CONTAINER_NAME:-follow-alloy}
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - internal
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: [observability]
    container_name: ${PROMETHEUS_CONTAINER_NAME:-follow-prometheus}
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - internal
    depends_on:
      follow-api:
        condition: service_healthy
      follow-image-gateway:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  node-exporter:
    image: prom/node-exporter:v1.11.1
    profiles: [observability]
    container_name: ${NODE_EXPORTER_CONTAINER_NAME:-follow-node-exporter}
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.1
    profiles: [observability]
    container_name: ${CADVISOR_CONTAINER_NAME:-follow-cadvisor}
    restart: unless-stopped
    command:
      - --docker_only=true
      - --housekeeping_interval=15s
      - --storage_duration=1m
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  valkey-exporter:
    image: oliver006/redis_exporter:v1.86.0
    profiles: [observability]
    container_name: ${VALKEY_EXPORTER_CONTAINER_NAME:-follow-valkey-exporter}
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      REDIS_ADDR: "redis://valkey:6379"
      REDIS_EXPORTER_CHECK_STREAMS: "image:*"
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    profiles: [observability]
    container_name: ${POSTGRES_EXPORTER_CONTAINER_NAME:-follow-postgres-exporter}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATA_SOURCE_USER: "postgres_exporter"
      DATA_SOURCE_PASS: "${POSTGRES_EXPORTER_PASSWORD}"
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  grafana:
    image: grafana/grafana:12.0.1
    profiles: [observability]
    container_name: ${GRAFANA_CONTAINER_NAME:-follow-grafana}
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://grafana.follow-nav.com
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.resend.com}:${SMTP_PORT}
      - GF_SMTP_USER=${SMTP_USERNAME:-resend}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=alerts@send.follow-nav.com
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    networks:
      - internal
    depends_on:
      - prometheus
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

# ── Volumes ────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  minio_data:
    driver: local
  loki_data:
    driver: local
  alloy_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────

networks:
  internal:
    driver: bridge
    name: ${NETWORK_NAME:-follow-internal}
